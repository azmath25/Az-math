<body><main><h2>Problem 2</h2><p><b>Statement:</b> Find the area of a circle of radius 3</p><p><b>Date:</b> 2025-01-05</p><p><b>Topic:</b> Geometry</p><button onclick="document.getElementById('solution').style.display='block'">Show Solution</button><div id="solution" style="display:none;"><p>Formula for area is A = πr²</p><p>Plugging in r=3:</p><p>A = π × 9 = 9π ≈ 28.27</p><img src="../assets/img/example2.png" alt="Circle illustration"></div></main></body></html>
